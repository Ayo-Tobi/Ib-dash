<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MD Global Partners Deal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0B0E; --panel: #131519; --panel-raised: #1A1D23;
    --line: rgba(255,255,255,0.07); --line-soft: rgba(255,255,255,0.045);
    --platinum: #C7CBD3; --platinum-dim: rgba(199,203,211,0.08);
    --text-hi: #F3F3F2; --text-mid: #9396A0; --text-low: #54565F;
    --up: #7DD6A8; --down: #E58B8B; --warm: #D6A878;
    --accent-cr: #6BA8D6; --accent-ma: #A878D6;
    --header-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text-hi);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 110%, rgba(214,168,120,0.04), transparent 70%),
      radial-gradient(ellipse 70% 50% at 20% 70%, rgba(80,60,110,0.03), transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .header {
    position: sticky; top: 0; z-index: 100; height: var(--header-h);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    background: rgba(10,11,14,0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .brand-mark { display: flex; align-items: baseline; font-weight: 700; font-size: 20px; letter-spacing: -0.03em; user-select: none; }
  .brand-mark .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg, var(--platinum), var(--warm)); margin-left: 2px; box-shadow: 0 0 6px rgba(214,168,120,0.5); }
  .page-title { font-size: 14px; font-weight: 600; color: var(--text-mid); margin-left: 4px; }
  .header-spacer { flex: 1; }
  .nav-link {
    font-size: 12px; color: var(--text-mid); text-decoration: none;
    border: 1px solid var(--line); border-radius: 7px; padding: 7px 12px;
  }
  .nav-link:hover { color: var(--text-hi); background: var(--platinum-dim); }
  .signout { font-size: 12px; color: var(--text-mid); background: none; border: 1px solid var(--line); border-radius: 7px; padding: 7px 12px; cursor: pointer; font-family: inherit; }
  .signout:hover { color: var(--text-hi); background: var(--platinum-dim); }

  .main { position: relative; z-index: 1; padding: 28px 24px 60px; max-width: 1200px; margin: 0 auto; }
  .section-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid); margin: 0 0 12px; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat-card {
    background: linear-gradient(180deg, var(--panel) 0%, #101216 100%);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px;
  }
  .stat-card .lbl { font-size: 11px; color: var(--text-mid); margin-bottom: 6px; }
  .stat-card .val { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; font-family: 'IBM Plex Mono', monospace; }
  .stat-card .sub { font-size: 11px; color: var(--text-low); margin-top: 4px; }

  .chart-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; margin-bottom: 32px; }
  .chart-card {
    background: linear-gradient(180deg, var(--panel) 0%, #101216 100%);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px;
  }
  .chart-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; }
  .chart-box { position: relative; height: 260px; }

  .recent-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .recent-table th {
    text-align: left; padding: 9px 12px;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-mid); border-bottom: 1px solid var(--line);
  }
  .recent-table td { padding: 10px 12px; border-bottom: 1px solid var(--line-soft); }
  .recent-table tr:last-child td { border-bottom: none; }
  .recent-table td.num { text-align: right; font-family: 'IBM Plex Mono', monospace; }
  .recent-wrap {
    background: linear-gradient(180deg, var(--panel) 0%, #101216 100%);
    border: 1px solid var(--line); border-radius: 12px; padding: 6px 8px;
  }
  .loading { padding: 60px 0; text-align: center; color: var(--text-low); font-size: 13px; }
  .empty-state { padding: 40px 20px; text-align: center; border: 1px dashed var(--line); border-radius: 10px; color: var(--text-mid); font-size: 13px; }

  @media (max-width: 820px) {
    .main { padding: 16px 12px 48px; }
    .header { padding: 0 14px; }
    .chart-grid { grid-template-columns: 1fr; }
    .chart-box { height: 220px; }
    .stat-card .val { font-size: 22px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="brand-mark">mdg<span class="dot" aria-hidden="true"></span></div>
  <div class="page-title">Dashboard</div>
  <div class="header-spacer"></div>
  <a class="nav-link" href="tracker.html">Deal Tracker</a>
  <button class="signout" id="signout">Sign out</button>
</header>

<main class="main">
  <div id="content"><div class="loading">Loading…</div></div>
</main>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script>
(function() {
  var cfg = window.MDG_CONFIG || {};
  var client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

  var ARCHIVE_MONTHS = cfg.ARCHIVE_MONTHS || 24;
  var archiveCutoff = (function() {
    var d = new Date();
    d.setMonth(d.getMonth() - ARCHIVE_MONTHS);
    return d;
  })();
  function isArchived(c) {
    if (!c.created_at) return false;
    var d = new Date(c.created_at);
    return !isNaN(d) && d < archiveCutoff;
  }

  var SECTOR_RULES = [
    { name: 'Healthcare',     re: /health|medic|pharma|bio|hospital|telehealth|life scien|drug|dental|diagnostic|clinic/ },
    { name: 'Infrastructure', re: /infrastruct|utilit|construction|transport|rail|road|bridge|pipeline|water|waste|telecom|engineering|airport|port\b/ },
    { name: 'Financials',     re: /financ|bank|insur|fintech|capital market|asset manage|lending|payment|credit/ },
    { name: 'Technology',     re: /tech|software|saas|semiconductor|internet|cloud|cyber|artificial intel|\bai\b|data|computer|electronic/ },
    { name: 'Energy',         re: /energy|oil|gas|solar|renewable|wind|power|electric/ },
    { name: 'Consumer',       re: /consumer|retail|restaurant|commerce|apparel|food|beverage|media|entertainment|hospitality|leisure/ },
    { name: 'Industrials',    re: /industrial|manufactur|aerospace|defense|defence|machinery|logistics|chemical|material|mining|agricult/ }
  ];
  function sectorBucket(c) {
    var hay = ((c.sector || '') + ' ' + (c.industry || '')).toLowerCase();
    for (var i = 0; i < SECTOR_RULES.length; i++) {
      if (SECTOR_RULES[i].re.test(hay)) return SECTOR_RULES[i].name;
    }
    return 'Other';
  }
  function esc(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function fmtNum(n) {
    n = Number(n);
    if (!isFinite(n)) return '—';
    if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  }

  document.getElementById('signout').addEventListener('click', async function() {
    await client.auth.signOut();
    window.location.href = 'index.html';
  });

  init();

  async function init() {
    var sess = await client.auth.getSession();
    if (!sess.data.session) {
      window.location.href = 'index.html';
      return;
    }

    var stagesRes = await client.from('deal_stages').select('key, label, sort_order').order('sort_order');
    var res = await client.from('companies')
      .select('id, name, ticker, company_type, sector, industry, deal_stage, service_type, deal_size, created_at');

    if (res.error) {
      document.getElementById('content').innerHTML =
        '<div class="empty-state">Could not load data: ' + esc(res.error.message) + '</div>';
      return;
    }

    var stageMap = {};
    (stagesRes.data || []).forEach(function(s) { stageMap[s.key] = s.label; });

    var all  = res.data || [];
    var live = all.filter(function(c) { return !isArchived(c); });
    var arch = all.length - live.length;

    var pipeline = live.reduce(function(s, c) {
      return s + (c.deal_size != null && isFinite(Number(c.deal_size)) ? Number(c.deal_size) : 0);
    }, 0);

    var bySector = {};
    live.forEach(function(c) {
      var k = sectorBucket(c);
      bySector[k] = (bySector[k] || 0) + 1;
    });
    var topSector = Object.keys(bySector).sort(function(a, b) { return bySector[b] - bySector[a]; })[0] || '—';

    var byStage = {};
    live.forEach(function(c) {
      var k = stageMap[c.deal_stage] || c.deal_stage || 'Unassigned';
      byStage[k] = (byStage[k] || 0) + 1;
    });

    var recent = all.slice().sort(function(a, b) {
      return new Date(b.created_at) - new Date(a.created_at);
    }).slice(0, 8);

    render(live.length, arch, pipeline, topSector, bySector, byStage, recent, stageMap);
  }

  function render(liveCount, archCount, pipeline, topSector, bySector, byStage, recent, stageMap) {
    var html =
      '<p class="section-label">Pipeline overview · last ' + ARCHIVE_MONTHS + ' months</p>' +
      '<div class="stat-grid">' +
        '<div class="stat-card"><div class="lbl">Active deals</div><div class="val">' + liveCount + '</div></div>' +
        '<div class="stat-card"><div class="lbl">Pipeline value</div><div class="val">$' + fmtNum(pipeline) + '</div><div class="sub">Sum of deal sizes</div></div>' +
        '<div class="stat-card"><div class="lbl">Top sector</div><div class="val" style="font-size:20px;">' + esc(topSector) + '</div></div>' +
        '<div class="stat-card"><div class="lbl">Archived</div><div class="val">' + archCount + '</div><div class="sub">Older than ' + ARCHIVE_MONTHS + ' months</div></div>' +
      '</div>' +
      '<div class="chart-grid">' +
        '<div class="chart-card"><h3>Deals by sector</h3><div class="chart-box"><canvas id="chart-sector"></canvas></div></div>' +
        '<div class="chart-card"><h3>Deals by stage</h3><div class="chart-box"><canvas id="chart-stage"></canvas></div></div>' +
      '</div>' +
      '<p class="section-label">Recently added</p>' +
      '<div class="recent-wrap"><table class="recent-table"><thead><tr>' +
        '<th>Company</th><th>Sector</th><th>Stage</th><th style="text-align:right;">Deal size</th><th>Added</th>' +
      '</tr></thead><tbody>' +
      recent.map(function(c) {
        var d = c.created_at ? new Date(c.created_at) : null;
        return '<tr>' +
          '<td style="font-weight:600;">' + esc(c.name) + (c.ticker ? ' <span style="color:var(--text-low);font-size:10px;font-family:\'IBM Plex Mono\',monospace;">' + esc(c.ticker) + '</span>' : '') + '</td>' +
          '<td>' + esc(sectorBucket(c)) + '</td>' +
          '<td>' + esc(stageMap[c.deal_stage] || c.deal_stage || '—') + '</td>' +
          '<td class="num">' + (c.deal_size != null ? '$' + fmtNum(c.deal_size) : '—') + '</td>' +
          '<td style="color:var(--text-mid);">' + (d && !isNaN(d) ? d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : '—') + '</td>' +
        '</tr>';
      }).join('') +
      '</tbody></table></div>';

    document.getElementById('content').innerHTML =
      recent.length === 0
        ? '<div class="empty-state"><div>No deals yet</div><div>Add your first deal in Supabase or ask Nexus to add one.</div></div>'
        : html;

    if (recent.length === 0) return;

    Chart.defaults.color = '#9396A0';
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 11;

    var sectorNames = Object.keys(bySector).sort(function(a, b) { return bySector[b] - bySector[a]; });
    new Chart(document.getElementById('chart-sector'), {
      type: 'bar',
      data: {
        labels: sectorNames,
        datasets: [{
          data: sectorNames.map(function(k) { return bySector[k]; }),
          backgroundColor: 'rgba(199,203,211,0.55)',
          borderRadius: 4
        }]
      },
      options: {
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false } },
          y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: 'rgba(255,255,255,0.05)' } }
        }
      }
    });

    var stageNames = Object.keys(byStage);
    var stageColors = ['#6BA8D6', '#A878D6', '#7DD6A8', '#D6A878', '#C7CBD3', '#E58B8B'];
    new Chart(document.getElementById('chart-stage'), {
      type: 'doughnut',
      data: {
        labels: stageNames,
        datasets: [{
          data: stageNames.map(function(k) { return byStage[k]; }),
          backgroundColor: stageNames.map(function(_, i) { return stageColors[i % stageColors.length]; }),
          borderColor: '#131519',
          borderWidth: 2
        }]
      },
      options: {
        maintainAspectRatio: false,
        cutout: '62%',
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12 } } }
      }
    });
  }
})();
</script>
</body>
</html>
