<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — MD Global Partners Deal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0B0E; --panel: #131519; --panel-raised: #1A1D23;
    --line: rgba(255,255,255,0.07);
    --platinum: #C7CBD3; --platinum-dim: rgba(199,203,211,0.08);
    --text-hi: #F3F3F2; --text-mid: #9396A0; --text-low: #54565F;
    --warm: #D6A878; --down: #E58B8B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text-hi);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 110%, rgba(214,168,120,0.05), transparent 70%),
      radial-gradient(ellipse 70% 50% at 20% 70%, rgba(80,60,110,0.04), transparent 60%);
    pointer-events: none;
  }
  .wrap {
    position: relative; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: linear-gradient(180deg, var(--panel) 0%, #101216 100%);
    border: 1px solid var(--line); border-radius: 16px;
    padding: 36px 32px;
  }
  .brand { display: flex; align-items: baseline; justify-content: center; font-weight: 700; font-size: 28px; letter-spacing: -0.03em; margin-bottom: 6px; }
  .brand .dot { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, var(--platinum), var(--warm)); margin-left: 3px; box-shadow: 0 0 8px rgba(214,168,120,0.5); }
  .sub { text-align: center; font-size: 12px; color: var(--text-mid); margin-bottom: 30px; letter-spacing: 0.04em; }
  label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); margin: 0 0 6px; }
  input {
    width: 100%; padding: 11px 12px; margin-bottom: 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--line); border-radius: 8px;
    color: var(--text-hi); font-family: inherit; font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--platinum); }
  button {
    width: 100%; padding: 12px;
    background: var(--platinum); color: #0A0B0E;
    border: none; border-radius: 8px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 140ms ease;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  .error {
    display: none; margin-top: 14px; padding: 10px 12px;
    background: rgba(229,139,139,0.08); border: 1px solid rgba(229,139,139,0.25);
    border-radius: 8px; color: var(--down); font-size: 12px;
  }
  .foot { margin-top: 24px; text-align: center; font-size: 11px; color: var(--text-low); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">mdg<span class="dot" aria-hidden="true"></span></div>
    <div class="sub">Deal Tracker</div>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
      <button type="submit" id="btn">Sign in</button>
    </form>
    <div class="error" id="error"></div>
    <div class="foot">Team access only. Contact your administrator for an account.</div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  var cfg = window.MDG_CONFIG || {};
  if (!cfg.SUPABASE_URL || cfg.SUPABASE_URL.indexOf('PASTE_') === 0) {
    document.getElementById('error').textContent = 'Setup incomplete: paste your Supabase URL and key into config.js.';
    document.getElementById('error').style.display = 'block';
    return;
  }
  var client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

  client.auth.getSession().then(function(res) {
    if (res.data.session) window.location.href = 'dashboard.html';
  });

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = document.getElementById('btn');
    var err = document.getElementById('error');
    btn.disabled = true; btn.textContent = 'Signing in…'; err.style.display = 'none';

    var res = await client.auth.signInWithPassword({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    });

    if (res.error) {
      err.textContent = res.error.message === 'Invalid login credentials'
        ? 'Email or password is incorrect.'
        : res.error.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign in';
      return;
    }
    window.location.href = 'dashboard.html';
  });
})();
</script>
</body>
</html>
